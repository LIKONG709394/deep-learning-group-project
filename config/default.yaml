# YOLO: without custom blackboard weights, falls back to full-frame or contour heuristic
yolo:
  weights_path: null # e.g. "weights/blackboard_yolov8.pt"
  conf: 0.25
  iou: 0.45
  blackboard_class_id: 0 # class index for blackboard in your trained model

trocr:
  model_name: "microsoft/trocr-base-handwritten"
  printed_model_name: "microsoft/trocr-base-printed"
  video_enable_printed_fallback: true

whisper:
  model_size: "base"
  enable_silence_segmentation: true
  silence_threshold: 0.0004
  silence_duration_sec: 1.0
  min_segment_sec: 2.0
  max_segment_sec: 20.0
  analysis_window_sec: 0.1
  skip_energy_threshold: 0.00012

video:
  sample_every_sec: 2.0
  min_change_ratio: 0.02
  min_keyframe_score: 45.0
  max_keyframes: 8
  min_roi_area_ratio: 0.35

sbert:
  model_name: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"

clarity:
  # Laplacian variance (higher = sharper; tune for resolution)
  laplacian_clear_min: 120.0
  laplacian_messy_max: 40.0
  stroke_variance_messy_min: 8.0

semantic:
  high_match_min: 0.72
  partial_min: 0.45
  keyword_overlap_high: 0.35
